services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retailpassword
      POSTGRES_DB: orders
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d orders"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog:
    build:
      context: ./src/catalog
    environment:
      GIN_MODE: release
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: postgres
      RETAIL_CATALOG_PERSISTENCE_ENDPOINT: db:5432
      RETAIL_CATALOG_PERSISTENCE_DB_NAME: catalogdb
      RETAIL_CATALOG_PERSISTENCE_USER: retail_user
      RETAIL_CATALOG_PERSISTENCE_PASSWORD: retailpassword
    depends_on:
      db:
        condition: service_healthy

  carts:
    build:
      context: ./src/cart
    environment:
      CART_PERSISTENCE_PROVIDER: postgres
      CART_POSTGRES_HOST: db
      CART_POSTGRES_PORT: "5432"
      CART_POSTGRES_DB: cartdb
      CART_POSTGRES_USER: retail_user
      CART_POSTGRES_PASSWORD: retailpassword
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  orders:
    build:
      context: ./src/orders
    environment:
      GIN_MODE: release
      RETAIL_ORDERS_PERSISTENCE_ENDPOINT: db:5432
      RETAIL_ORDERS_PERSISTENCE_NAME: orders
      RETAIL_ORDERS_PERSISTENCE_USERNAME: retail_user
      RETAIL_ORDERS_PERSISTENCE_PASSWORD: retailpassword
    depends_on:
      db:
        condition: service_healthy

  checkout:
    build:
      context: ./src/checkout
    environment:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: redis
      RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: redis://redis:6379
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders:8080
    depends_on:
      redis:
        condition: service_healthy
      orders:
        condition: service_started

  ui:
    build:
      context: ./src/ui
    environment:
      RETAIL_UI_ENDPOINTS_CATALOG:  http://catalog:8080
      RETAIL_UI_ENDPOINTS_CARTS:    http://carts:8080
      RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout:8080
      RETAIL_UI_ENDPOINTS_ORDERS:   http://orders:8080
    ports:
      - "8080:8080"
    depends_on:
      catalog:
        condition: service_started
      carts:
        condition: service_started
      orders:
        condition: service_started
      checkout:
        condition: service_started

  admin:
    build:
      context: ./src/admin
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: retail_user
      DB_PASSWORD: retailpassword
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_JWT_SECRET: change-me-in-production
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
