$kind: http-request
name: List Tags
method: GET
url: '{{baseUrl}}/catalog/tags'
order: 4000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /catalog/tags returns an array (or an object with a tags array)
      pm.test('List Tags: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('List Tags: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('List Tags: Content-Type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('List Tags: body is an array or contains a tags array', function () {
        var body = pm.response.json();
        var tags = Array.isArray(body) ? body : (body && body.tags);
        pm.expect(Array.isArray(tags)).to.be.true;
      });

      // Independent error case: request a clearly invalid path.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/catalog/__does_not_exist__', method: 'GET' },
        function (err, res) {
          pm.test('List Tags: invalid path returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
          });
        }
      );
