$kind: http-request
name: Get Catalog Size
method: GET
url: '{{baseUrl}}/catalog/size'
order: 3000
queryParams:
  - key: tags
    value: ''
    disabled: true
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /catalog/size returns a numeric size/count
      pm.test('Get Catalog Size: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Get Catalog Size: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('Get Catalog Size: Content-Type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('Get Catalog Size: body exposes a numeric size/count', function () {
        var body = pm.response.json();
        // Tolerant of field name and of a bare numeric response.
        var value = (body && typeof body === 'object')
          ? (body.size !== undefined ? body.size
            : (body.count !== undefined ? body.count
            : (body.total !== undefined ? body.total : body)))
          : body;
        pm.expect(value).to.be.a('number');
      });

      // Independent error case: request a clearly invalid path.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/catalog/__does_not_exist__', method: 'GET' },
        function (err, res) {
          pm.test('Get Catalog Size: invalid path returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
          });
        }
      );
