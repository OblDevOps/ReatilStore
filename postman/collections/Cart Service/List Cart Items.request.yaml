$kind: http-request
name: List Cart Items
method: GET
url: '{{baseUrl}}/carts/{{customerId}}/items'
order: 4000
pathVariables:
  - key: customerId
    value: 'customer-1'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /carts/{customerId}/items should return a list
      pm.test('List Cart Items: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('List Cart Items: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('List Cart Items: content-type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('List Cart Items: body is an array', function () {
        var body = pm.response.json();
        pm.expect(body).to.be.an('array');
      });

      // Independent error case: request items for a clearly nonexistent customer.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/carts/__no_such_customer_zzz/items', method: 'GET' },
        function (err, res) {
          pm.test('List Cart Items: nonexistent customer returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
            pm.expect([400, 404, 422]).to.include(res.code);
          });
        }
      );
