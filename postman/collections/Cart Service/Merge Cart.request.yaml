$kind: http-request
name: Merge Cart
method: GET
url: '{{baseUrl}}/carts/{{customerId}}/merge?sessionId={{sessionId}}'
order: 3000
pathVariables:
  - key: customerId
    value: 'customer-1'
queryParams:
  - key: sessionId
    value: '{{sessionId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /carts/{customerId}/merge should merge and return the cart
      pm.test('Merge Cart: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Merge Cart: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('Merge Cart: content-type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('Merge Cart: body is an object', function () {
        var body = pm.response.json();
        pm.expect(body).to.be.an('object');
      });

      // Independent error case: nonexistent customer and omit sessionId.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/carts/__no_such_customer_zzz/merge', method: 'GET' },
        function (err, res) {
          pm.test('Merge Cart: invalid request returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
            pm.expect([400, 404, 422]).to.include(res.code);
          });
        }
      );
