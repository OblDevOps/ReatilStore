$kind: http-request
name: Topology
method: GET
url: '{{baseUrl}}/topology'
order: 9000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /topology should return service topology
      pm.test('Topology: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Topology: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('Topology: content-type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('Topology: body is present', function () {
        var body = pm.response.json();
        pm.expect(body).to.not.be.undefined;
      });

      // Independent error case: request a clearly invalid path.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/__does_not_exist__', method: 'GET' },
        function (err, res) {
          pm.test('Topology: invalid path returns 404', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
            pm.expect([404]).to.include(res.code);
          });
        }
      );
