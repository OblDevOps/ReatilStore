$kind: http-request
name: Get Cart
method: GET
url: '{{baseUrl}}/carts/{{customerId}}'
order: 1000
pathVariables:
  - key: customerId
    value: 'customer-1'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: GET /carts/{customerId} should return the cart
      pm.test('Get Cart: status code is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Get Cart: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      pm.test('Get Cart: content-type is JSON', function () {
        pm.expect(pm.response.headers.get('Content-Type') || '').to.include('json');
      });

      pm.test('Get Cart: body is an object', function () {
        var body = pm.response.json();
        pm.expect(body).to.be.an('object');
      });

      // Independent error case: request a clearly nonexistent customer id.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/carts/__no_such_customer_zzz', method: 'GET' },
        function (err, res) {
          pm.test('Get Cart: nonexistent customer returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
            pm.expect([400, 404, 422]).to.include(res.code);
          });
        }
      );
