$kind: http-request
name: Delete Cart Item
method: DELETE
url: '{{baseUrl}}/carts/{{customerId}}/items/{{itemId}}'
order: 8000
pathVariables:
  - key: customerId
    value: 'customer-1'
  - key: itemId
    value: 'PRODUCT-1'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Happy path: DELETE /carts/{customerId}/items/{itemId} should succeed
      pm.test('Delete Cart Item: status code is a success (200/204)', function () {
        pm.expect([200, 204]).to.include(pm.response.code);
      });

      pm.test('Delete Cart Item: response time is reasonable', function () {
        pm.expect(pm.response.responseTime).to.be.below(5000);
      });

      // Independent error case: target a clearly nonexistent item id.
      var baseUrl = pm.variables.replaceIn('{{baseUrl}}');
      pm.sendRequest(
        { url: baseUrl + '/carts/__no_such_customer_zzz/items/__no_such_item_zzz', method: 'DELETE' },
        function (err, res) {
          pm.test('Delete Cart Item: nonexistent item returns an error (>= 400)', function () {
            pm.expect(err).to.be.null;
            pm.expect(res.code).to.be.at.least(400);
            pm.expect([400, 404, 422]).to.include(res.code);
          });
        }
      );
