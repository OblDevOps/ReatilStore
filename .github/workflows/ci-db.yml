name: CI/CD - Database

on:
  push:
    branches: [main]
    paths:
      - "src/db/**"
      - ".github/workflows/ci-db.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/db/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  validate-sql:
    name: Validate SQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orders
          POSTGRES_USER: retail_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run init SQL
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U retail_user -d orders -f src/db/init-db.sql

      - name: Verify databases and schema
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U retail_user -d catalogdb -c "SELECT 1"
          psql -h localhost -U retail_user -d cartdb -c "SELECT COUNT(*) FROM cart_items"

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [secrets-scan, validate-sql]
    if: github.event_name != 'pull_request'

    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$REGISTRY/db:${{ github.sha }}" \
            -t "$REGISTRY/db:latest" \
            src/db

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/db:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Push image to ECR
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push "$REGISTRY/db:${{ github.sha }}"
          docker push "$REGISTRY/db:latest"
          echo "image_uri=$REGISTRY/db:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy-dev:
    name: Deploy → dev
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Promote image to dev
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SOURCE: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          docker pull "$SOURCE"
          docker tag "$SOURCE" "$REGISTRY/db:dev"
          docker push "$REGISTRY/db:dev"

      - name: Update ECS service (dev)
        run: |
          aws ecs update-service \
            --cluster retailstore-dev \
            --service db \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  deploy-test:
    name: Deploy → test
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Promote image to test
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SOURCE: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          docker pull "$SOURCE"
          docker tag "$SOURCE" "$REGISTRY/db:test"
          docker push "$REGISTRY/db:test"

      - name: Update ECS service (test)
        run: |
          aws ecs update-service \
            --cluster retailstore-test \
            --service db \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  deploy-prod:
    name: Deploy → prod
    needs: [deploy-dev, deploy-test, build-and-push]
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Promote image to prod
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SOURCE: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          docker pull "$SOURCE"
          docker tag "$SOURCE" "$REGISTRY/db:prod"
          docker push "$REGISTRY/db:prod"

      - name: Update ECS service (prod)
        run: |
          aws ecs update-service \
            --cluster retailstore-prod \
            --service db \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
