name: CI/CD - Orders

on:
  push:
    branches: [main]
    paths:
      - "src/orders/**"
      - ".github/workflows/ci-orders.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/orders/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  # Detector de secretos con TruffleHog
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  # Análisis estático de código con Semgrep
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep:1.167.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep-results.sarif \
            src/orders
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  # Análisis de vulnerabilidades de dependencias con Trivy (filesystem)
  sca:
    name: SCA (Trivy filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem — dependencies)
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: fs
          scan-ref: src/orders
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
