name: Terraform CI

on:
  push:
    branches: ["main"]
    paths:
      - "environments/**"
      - "modules/**"
  pull_request:
    branches: ["main"]
    paths:
      - "environments/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a operar"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod
      action:
        description: "Qué hacer en el ambiente elegido"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_REGION: us-east-1
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
  TF_VAR_admin_jwt_secret: ${{ secrets.ADMIN_JWT_SECRET }}

jobs:
  #validación. ejecuta siempre, en push, PR y trigger manual
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file="terraform.tfvars" -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = "${{ github.event.inputs.environment || 'dev' }}";
            const planOutput = fs.readFileSync('/tmp/plan.txt', 'utf8');

            // Truncar si es muy grande (límite de 65536 chars por comentario)
            const MAX = 60000;
            const body = planOutput.length > MAX
              ? planOutput.slice(0, MAX) + '\n\n... (truncado)'
              : planOutput;

            const output = [
              `### Terraform Plan — \`${env}\``,
              '```',
              body,
              '```',
              `*Autor: @${{ github.actor }}*`
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  #apply manual. dispara al elegir la opción apply
  apply:
    name: Apply (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Show URLs
        run: |
          echo "=== URLs ${{ github.event.inputs.environment }} ==="
          echo "UI:       $(terraform output -raw ui_alb_dns)"
          echo "API GW:   $(terraform output -raw api_gateway_ui_url)"
          echo "UI Admin: $(terraform output -raw ui_admin_alb_dns)"

  #apply automático a dev al mergear a main
  apply-dev:
    name: Apply → dev
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Show URLs
        run: |
          echo "=== URLs dev ==="
          echo "UI:       $(terraform output -raw ui_alb_dns)"
          echo "API GW:   $(terraform output -raw api_gateway_ui_url)"
          echo "UI Admin: $(terraform output -raw ui_admin_alb_dns)"

  # apply automático a test después de que dev pase
  apply-test:
    name: Apply → test
    if: github.event_name == 'push'
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: test
    defaults:
      run:
        working-directory: environments/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Show URLs
        run: |
          echo "=== URLs test ==="
          echo "UI:       $(terraform output -raw ui_alb_dns)"
          echo "API GW:   $(terraform output -raw api_gateway_ui_url)"
          echo "UI Admin: $(terraform output -raw ui_admin_alb_dns)"

  # apply a prod con aprobación requerida, después de que test pase
  apply-prod:
    name: Apply → prod
    if: github.event_name == 'push'
    needs: apply-test
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Show URLs #muestra las urls necesarias
        run: |
          echo "=== URLs prod ==="
          echo "UI:       $(terraform output -raw ui_alb_dns)"
          echo "API GW:   $(terraform output -raw api_gateway_ui_url)"
          echo "UI Admin: $(terraform output -raw ui_admin_alb_dns)"
