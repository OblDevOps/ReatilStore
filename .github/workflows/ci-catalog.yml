name: CI/CD - Catalog

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/catalog/**'
      - '.github/workflows/ci-catalog.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'src/catalog/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/catalog
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build & Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- SECRETS ----------
      - name: Detect secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- SAST ----------
      # TODO: descomentar cuando Semgrep esté configurado
      # - name: Run Semgrep
      #   uses: semgrep/semgrep-action@v1
      #   with:
      #     config: >
      #       p/golang
      #       p/secrets
      #       p/owasp-top-ten

      # ---------- SCA ----------
      # TODO: descomentar cuando se implemente seguridad
      # - name: Run Trivy (filesystem)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: fs
      #     scan-ref: src/catalog
      #     severity: CRITICAL,HIGH
      #     exit-code: '1'
      #     ignore-unfixed: true

      # ---------- DOCKER ----------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/catalog
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      # ---------- IMAGE SCAN ----------
      # TODO: descomentar cuando se implemente seguridad
      # - name: Run Trivy (image)
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     severity: CRITICAL,HIGH
      #     exit-code: '1'
      #     ignore-unfixed: true

      # ---------- PUSH ----------
      - name: Push image to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: src/catalog
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- SONARQUBE (pendiente) ----------
      # TODO: descomentar cuando SonarQube esté levantado
      # - name: SonarQube Scan
      #   uses: SonarSource/sonarqube-scan-action@master
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ----------------------------------------
  deploy-dev:
    name: Deploy → dev
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (dev)
        run: |
          aws ecs update-service \
            --cluster retail-dev \
            --service catalog \
            --force-new-deployment

  # ----------------------------------------
  deploy-test:
    name: Deploy → test
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (test)
        run: |
          aws ecs update-service \
            --cluster retail-test \
            --service catalog \
            --force-new-deployment

  # ----------------------------------------
  deploy-prod:
    name: Deploy → prod
    needs: deploy-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (prod)
        run: |
          aws ecs update-service \
            --cluster retail-prod \
            --service catalog \
            --force-new-deployment