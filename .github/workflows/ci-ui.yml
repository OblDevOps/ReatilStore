name: CI/CD - UI

on:
  push:
    branches: [main]
    paths:
      - "src/ui/**"
      - ".github/workflows/ci-ui.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/ui/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  # Detector de secretos con TruffleHog
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  # Análisis estático de código con Semgrep
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep:1.167.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep-results.sarif \
            src/ui
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  # Análisis de vulnerabilidades de dependencias con Trivy (filesystem)
  sca:
    name: SCA (Trivy filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem — dependencies)
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # master
        with:
          scan-type: fs
          scan-ref: src/ui
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  # Pruebas de integración con Newman
  tests:
    name: Integration Tests (Newman)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        working-directory: src/ui
        run: npm ci

      - name: Build UI
        working-directory: src/ui
        run: npm run build

      - name: Start UI service
        working-directory: src/ui
        run: node dist/app.js &

      - name: Wait for UI to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080/health; then
              echo "UI is up"
              exit 0
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done
          echo "UI never became ready"
          exit 1

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests
        run: |
          newman run tests/postman/ui.postman_collection.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export tests/postman/reports/ui-report.html \
            --bail

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: newman-report-ui
          path: tests/postman/reports/ui-report.html
